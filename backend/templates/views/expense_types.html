<div x-show="view === 'expense_types'" class="max-w-2xl mx-auto" x-cloak>
    <div class="bg-white p-6 rounded-lg shadow mb-6">
        <h3 class="font-bold mb-4" x-text="isEditingET ? t('edit_expense_type') : t('add_new_expense_type')">
        </h3>
        <div class="flex flex-col md:flex-row gap-4">
            <input type="text" x-model="newET.name" 
                @input.debounce.500ms="translateText(newET.name, (val) => { newET.name_chinese = val.zh; newET.name_en = val.en; })"
                :placeholder="t('name_ar')"
                class="flex-1 border p-2 rounded">
            <input type="text" x-model="newET.name_chinese" :placeholder="t('name_zh')"
                class="flex-1 border p-2 rounded italic text-gray-500">
            <input type="text" x-model="newET.name_en" :placeholder="'Name (English)'"
                class="flex-1 border p-2 rounded italic text-gray-500">
            <button @click="addExpenseType()" class="bg-indigo-600 text-white px-6 py-2 rounded shrink-0"
                x-text="isEditingET ? t('update') : t('save')"></button>
            <button x-show="isEditingET" @click="resetET()"
                class="bg-gray-200 px-4 py-2 rounded" x-text="t('cancel')"></button>
        </div>
        <p class="text-[10px] text-gray-400 mt-2" x-text="t('auto_translate_msg')"></p>
    </div>
    <div class="bg-white rounded-lg shadow">
        <template x-for="et in expenseTypes" :key="et.id">
            <div class="p-4 border-b flex justify-between items-center hover:bg-gray-50">
                <div>
                    <span class="font-semibold" x-text="et.name"></span>
                    <span class="text-gray-400 mx-2">|</span>
                    <span class="text-indigo-600" x-text="et.name_chinese"></span>
                    <span class="text-gray-400 mx-2">|</span>
                    <span class="text-teal-600" x-text="et.name_en"></span>
                </div>
                <div class="flex gap-3">
                    <button @click="editET(et)" class="text-blue-600 hover:text-blue-800"
                        :title="t('edit')">✏️</button>
                    <button @click="deleteET(et.id)" class="text-red-600 hover:text-red-800"
                        :title="t('delete')">🗑️</button>
                </div>
            </div>
        </template>
    </div>
</div>

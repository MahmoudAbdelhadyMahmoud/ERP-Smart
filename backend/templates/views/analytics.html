<div x-show="view === 'analytics'" x-cloak>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
        <div
            class="bg-emerald-500 text-white p-6 rounded-2xl shadow-lg shadow-emerald-100 flex items-center justify-between">
            <div>
                <div class="text-emerald-50 text-sm font-bold mb-1" x-text="t('total_expenses_period')"></div>
                <div class="text-3xl font-black" x-text="formatMoney(totalSum) + ' ' + t('egp')"></div>
            </div>
            <span class="text-4xl opacity-30">💰</span>
        </div>
        <div
            class="bg-indigo-500 text-white p-6 rounded-2xl shadow-lg shadow-indigo-100 flex items-center justify-between">
            <div>
                <div class="text-indigo-50 text-sm font-bold mb-1" x-text="t('total_operations')"></div>
                <div class="text-3xl font-black" x-text="filteredExpenses.length + ' ' + t('operation')"></div>
            </div>
            <span class="text-4xl opacity-30">📋</span>
        </div>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <!-- Types Table -->
        <div class="bg-white p-6 rounded-lg shadow">
            <h3 class="font-bold mb-4 border-b pb-2" x-text="t('expenses_per_type')"></h3>
            <table class="w-full text-right">
                <template x-for="(total, type) in analyticsSummary" :key="type">
                    <tr class="border-b">
                        <td class="py-3 font-semibold" x-text="type"></td>
                        <td class="py-3 text-indigo-600 font-bold" x-text="formatMoney(total) + ' ' + t('egp')">
                        </td>
                    </tr>
                </template>
            </table>
        </div>

        <!-- Chart -->
        <div class="bg-white p-6 rounded-lg shadow">
            <h3 class="font-bold mb-4 border-b pb-2" x-text="t('expense_distribution_chart')"></h3>
            <div id="expenseChartContainer" class="relative w-full h-80 min-h-[300px] flex items-center justify-center">
                <canvas id="expenseChart"></canvas>
            </div>
        </div>
    </div>

    <!-- Recommendations -->
    <div class="mt-6 bg-yellow-50 border-r-4 border-yellow-500 p-6 rounded shadow">
        <h3 class="font-bold mb-3 flex items-center gap-2">
            <span>💡</span> <span x-text="t('smart_recommendations')"></span>
        </h3>
        <ul class="list-disc list-inside space-y-2 text-gray-700">
            <template x-for="rec in recommendations" :key="rec">
                <li x-text="rec"></li>
            </template>
        </ul>
    </div>
</div>

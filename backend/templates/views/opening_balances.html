<div x-show="view === 'opening_balances'" x-cloak>
    <div class="bg-white p-8 rounded-3xl shadow-lg border border-slate-100">
        <div class="flex justify-between items-center mb-8">
            <div>
                <h3 class="text-2xl font-black text-indigo-900" x-text="t('opening_balances_title')"></h3>
                <p class="text-gray-500 mt-1" x-text="t('opening_balances_desc')"></p>
            </div>
            <div class="flex gap-4">
                <button @click="approveCurrentBalances()"
                    class="bg-emerald-50 text-emerald-700 px-6 py-3 rounded-xl font-bold hover:bg-emerald-100 transition flex items-center gap-2 border border-emerald-100">
                    <span>✅</span> <span x-text="t('approve_current_balances')"></span>
                </button>
                <button @click="saveOpeningBalances()"
                    class="bg-indigo-600 text-white px-8 py-3 rounded-xl font-black hover:bg-indigo-700 transition shadow-lg flex items-center gap-2">
                    <span>💾</span> <span x-text="t('save_opening_balances')"></span>
                </button>
            </div>
        </div>

        <div class="overflow-hidden rounded-2xl border-2 border-gray-100 shadow-sm">
            <table class="w-full text-right border-collapse">
                <thead class="bg-indigo-950 text-white">
                    <tr>
                        <th class="p-5 font-bold" x-text="t('col_code')"></th>
                        <th class="p-5 font-bold" x-text="t('col_product_name')"></th>
                        <th class="p-5 font-bold" x-text="t('col_unit')"></th>
                        <th class="p-5 font-bold" x-text="t('col_current_stock')"></th>
                        <th class="p-5 font-bold text-center" x-text="t('col_opening_qty')"></th>
                        <th class="p-5 font-bold text-center" x-text="t('col_unit_price')"></th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-gray-100">
                    <template x-if="isLoadingOpening">
                        <tr>
                            <td colspan="6" class="p-10 text-center text-gray-400" x-text="t('loading_data')"></td>
                        </tr>
                    </template>
                    <template x-for="b in openingBalances" :key="b.id">
                        <tr class="hover:bg-slate-50 transition-colors">
                            <td class="p-5 font-mono text-gray-400 text-sm" x-text="b.code"></td>
                            <td class="p-5 font-bold text-indigo-900 text-right">
                                <div x-text="locName(b)"></div>
                                <div class="text-[10px] text-indigo-400 italic" x-show="lang !== 'zh' && b.name_chinese" x-text="b.name_chinese"></div>
                            </td>
                            <td class="p-5 text-gray-500 text-sm" x-text="b.unit"></td>
                            <td class="p-5 font-black text-lg text-slate-700" x-text="b.current_stock"></td>
                            <td class="p-5">
                                <input type="number" x-model="b.qty"
                                    class="w-32 mx-auto block border-2 border-gray-100 p-2 rounded-lg text-center font-mono focus:border-indigo-400 outline-none">
                            </td>
                            <td class="p-5">
                                <input type="number" step="0.01" x-model="b.price"
                                    class="w-32 mx-auto block border-2 border-gray-100 p-2 rounded-lg text-center font-mono focus:border-indigo-400 outline-none">
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div x-show="view === 'costing'" x-cloak class="max-w-7xl mx-auto space-y-6 px-4 pb-12">
    <div class="flex justify-between items-center bg-white p-4 rounded-lg shadow-sm border border-slate-200">
        <h2 class="text-2xl font-bold flex items-center gap-2 text-indigo-900">
            <span class="text-3xl">⚙️</span>
            <span x-text="t('costing_manufacturing')"></span>
        </h2>
        <div class="flex gap-2">
            <button @click="costingTab = 'recipes'" :class="costingTab === 'recipes' ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'" class="px-4 py-2 rounded-lg font-bold transition" x-text="t('recipes_bom')"></button>
            <button @click="costingTab = 'produce'" :class="costingTab === 'produce' ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'" class="px-4 py-2 rounded-lg font-bold transition" x-text="t('production_order')"></button>
        </div>
    </div>

    <!-- Recipes Tab -->
    <div x-show="costingTab === 'recipes'" class="bg-white p-6 rounded-lg shadow-sm border border-slate-200">
        <div class="flex justify-between items-center mb-6">
            <h3 class="text-lg font-bold" x-text="t('recipes_list')"></h3>
            <button @click="openRecipeModal()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-lg font-bold flex items-center gap-2">
                <span x-text="t('create_recipe')"></span>
            </button>
        </div>

        <div class="overflow-x-auto">
            <table class="w-full text-right text-sm">
                <thead class="bg-slate-50 text-slate-600 uppercase text-xs">
                    <tr>
                        <th class="px-4 py-3 border-b" x-text="t('recipe_name')"></th>
                        <th class="px-4 py-3 border-b" x-text="t('final_product')"></th>
                        <th class="px-4 py-3 border-b" x-text="t('output_qty')"></th>
                        <th class="px-4 py-3 border-b text-emerald-600" x-text="t('selling_price')"></th>
                        <th class="px-4 py-3 border-b" x-text="t('labor_overhead')"></th>
                        <th class="px-4 py-3 border-b" x-text="t('actions')"></th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-200">
                    <template x-for="recipe in recipes" :key="recipe.id">
                        <tr class="hover:bg-slate-50">
                            <td class="px-4 py-3 font-bold text-indigo-700">
                                <div x-text="locName(recipe)"></div>
                                <div class="text-[10px] italic text-indigo-400" x-show="lang !== 'zh' && recipe.name_chinese" x-text="recipe.name_chinese"></div>
                            </td>
                            <td class="px-4 py-3" x-text="locName(products.find(p => p.id === recipe.product_id), 'unknown_item')"></td>
                            <td class="px-4 py-3 text-slate-400 font-bold" x-text="recipe.base_quantity"></td>
                            <td class="px-4 py-3 text-emerald-600 font-black text-lg" x-text="formatMoney(recipe.selling_price)"></td>
                            <td class="px-4 py-3">
                                <div class="space-y-1">
                                    <div class="grid grid-cols-2 gap-x-2 text-[9px] font-bold border-b border-slate-100 pb-1">
                                        <div class="text-emerald-700"><span x-text="t('labor_cost')"></span>: <span x-text="formatMoney(recipe.labor_cost)"></span></div>
                                        <div class="text-amber-700"><span x-text="t('overhead_cost')"></span>: <span x-text="formatMoney(recipe.gas_cost + recipe.electricity_cost + recipe.water_cost + recipe.rent_cost + recipe.overhead_cost)"></span></div>
                                    </div>
                                    <div class="grid grid-cols-2 gap-x-2 text-[9px] font-bold text-slate-500 border-b border-slate-100 pb-1 italic">
                                        <div><span x-text="t('natural_gas')"></span>: <span x-text="formatMoney(recipe.gas_cost)"></span></div>
                                        <div><span x-text="t('electricity')"></span>: <span x-text="formatMoney(recipe.electricity_cost)"></span></div>
                                        <div><span x-text="t('water')"></span>: <span x-text="formatMoney(recipe.water_cost)"></span></div>
                                        <div><span x-text="t('rent')"></span>: <span x-text="formatMoney(recipe.rent_cost)"></span></div>
                                    </div>
                                    <div class="grid grid-cols-2 gap-x-2 text-[9px] font-bold">
                                        <div class="text-purple-600"><span x-text="t('marketing')"></span>: <span x-text="formatMoney(recipe.marketing_cost + recipe.ad_cost)"></span></div>
                                        <div class="text-indigo-600"><span x-text="t('admin_expenses')"></span>: <span x-text="formatMoney(recipe.admin_cost)"></span></div>
                                        <div class="text-blue-600"><span x-text="t('import_costs')"></span>: <span x-text="formatMoney(recipe.import_costs)"></span></div>
                                        <div class="text-red-600"><span x-text="t('taxes_title')"></span>: <span x-text="formatMoney(recipe.taxes)"></span></div>
                                        <div class="text-slate-600"><span x-text="t('other')"></span>: <span x-text="formatMoney(recipe.other_costs)"></span></div>
                                    </div>
                                </div>
                            </td>
                            <td class="px-4 py-3 flex gap-2">
                                <button @click="viewRecipeDetails(recipe)" class="bg-blue-50 text-blue-600 px-3 py-1 rounded-lg border border-blue-100 hover:bg-blue-100 transition font-bold text-xs" x-text="t('view')"></button>
                                <button @click="editRecipe(recipe)" class="bg-indigo-50 text-indigo-600 px-3 py-1 rounded-lg border border-indigo-100 hover:bg-indigo-100 transition font-bold text-xs" x-text="t('edit')"></button>
                                <button @click="deleteRecipe(recipe.id)" class="bg-red-50 text-red-600 px-3 py-1 rounded-lg border border-red-100 hover:bg-red-100 transition font-bold text-xs" x-text="t('delete')"></button>
                            </td>
                        </tr>
                    </template>
                    <tr x-show="recipes.length === 0">
                        <td colspan="7" class="py-6 text-center text-slate-500" x-text="t('no_recipes')"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Production Tab -->
    <div x-show="costingTab === 'produce'" class="bg-white p-6 rounded-lg shadow-sm border border-slate-200 max-w-2xl mx-auto">
        <h3 class="text-lg font-bold mb-6 text-indigo-900 border-b pb-2" x-text="t('issue_production_order')"></h3>
        
        <form @submit.prevent="submitProduction()">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-1" x-text="t('select_recipe')"></label>
                    <div class="relative" x-data="{ 
                        open: false, 
                        search: '',
                        init() {
                            this.$watch('productionForm.recipe_id', (val) => {
                                if (!val) this.search = '';
                                else {
                                    const r = recipes.find(r => r.id == val);
                                    if (r) this.search = r.name;
                                }
                            });
                        }
                    }">
                        <input type="text" x-model="search" @focus="open = true" @input="open = true" @click.away="setTimeout(() => open = false, 200)"
                            :placeholder="t('search_recipe_placeholder')"
                            class="w-full border p-3 rounded-xl focus:border-indigo-500 outline-none transition font-bold bg-white shadow-sm">
                        
                        <div x-show="open" x-transition class="absolute z-50 w-full mt-2 bg-white border-2 border-slate-100 rounded-2xl shadow-2xl max-h-64 overflow-y-auto">
                            <template x-for="r in recipes.filter(r => !search || r.name.includes(search))" :key="r.id">
                                <div @click="productionForm.recipe_id = r.id; search = r.name; open = false" 
                                    class="p-4 hover:bg-indigo-50 cursor-pointer border-b border-slate-50 last:border-0 transition-colors">
                                    <div class="font-black text-slate-800" x-text="r.name"></div>
                                    <div class="text-[10px] text-indigo-400 font-bold" x-text="t('final_product') + ': ' + getProductName(r.product_id)"></div>
                                </div>
                            </template>
                            <div x-show="recipes.filter(r => !search || r.name.includes(search)).length === 0" 
                                class="p-4 text-center text-slate-400 font-bold" x-text="t('no_results')">
                            </div>
                        </div>
                    </div>
                </div>
                
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-1" x-text="t('target_production_qty')"></label>
                    <input type="number" step="0.01" x-model="productionForm.quantity" required class="w-full p-2 border border-slate-300 rounded focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500" placeholder="0.00">
                </div>

                <div class="bg-blue-50 text-blue-800 p-4 rounded-lg text-sm">
                    ⚠️ <strong x-text="t('system_will_auto')"></strong>
                    <ul class="list-disc ps-6 mt-2 space-y-1">
                        <li x-text="t('auto_deduct_raw')"></li>
                        <li x-text="t('auto_add_labor')"></li>
                        <li x-text="t('auto_increase_stock')"></li>
                    </ul>
                </div>

                <button type="submit" :disabled="isProducing" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-lg shadow disabled:opacity-50">
                    <span x-show="!isProducing" x-text="t('confirm_production')"></span>
                    <span x-show="isProducing" x-text="t('producing_status')"></span>
                </button>
            </div>
        </form>
    </div>

</div>

<!-- Recipe Modal -->
<div x-show="recipeModalOpen" x-cloak class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-md overflow-y-auto">
    <div @click.away="recipeModalOpen = false" class="bg-white rounded-[3rem] shadow-2xl w-full max-w-[95vw] flex flex-col max-h-[95vh] border border-white/20 relative overflow-hidden"
        x-transition:enter="transition ease-out duration-300"
        x-transition:enter-start="opacity-0 scale-95 translate-y-8"
        x-transition:enter-end="opacity-100 scale-100 translate-y-0">
        <!-- Modal Header -->
        <div class="p-8 border-b flex justify-between items-center bg-gradient-to-r from-indigo-900 to-indigo-800 rounded-t-2xl text-white">
            <div>
                <h2 class="text-3xl font-black" x-text="isEditingRecipe ? t('edit_recipe') : t('define_new_recipe')"></h2>
                <p class="text-indigo-200 mt-1 text-sm font-bold" x-text="t('recipe_description_help')"></p>
            </div>
            <button @click="recipeModalOpen = false" class="bg-white/10 hover:bg-white/20 text-white w-10 h-10 rounded-full flex items-center justify-center transition-all text-2xl">&times;</button>
        </div>
        
        <div class="p-8 overflow-y-auto flex-1">
            <form id="recipeForm" @submit.prevent="submitRecipe()" class="space-y-10">
                
                <!-- Section 1: Basic Information -->
                <div class="section-container">
                    <div class="flex items-center gap-3 mb-6 border-b-2 border-indigo-100 pb-3">
                        <span class="bg-indigo-600 text-white w-8 h-8 rounded-full flex items-center justify-center font-bold">1</span>
                        <h3 class="text-xl font-black text-indigo-900 uppercase tracking-wide" x-text="t('recipe_basic_info')"></h3>
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-8 p-6 bg-slate-50/50 rounded-2xl border border-slate-100 shadow-sm">
                        <div class="space-y-2">
                            <label class="block text-sm font-black text-slate-700">📌 <span x-text="t('recipe_name')"></span> <span class="text-red-500">*</span></label>
                            <input type="text" x-model="recipeForm.name" required 
                                @input.debounce.500ms="translateText(recipeForm.name, (val) => { recipeForm.name_chinese = val.zh; recipeForm.name_en = val.en; })"
                                class="w-full p-4 border-2 border-slate-200 rounded-xl focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 transition-all font-bold text-lg" 
                                :placeholder="t('recipe_name')">
                        </div>
                        <div class="space-y-2">
                            <label class="block text-sm font-black text-slate-700 text-indigo-400">🉐 <span x-text="t('chinese_name')"></span></label>
                            <input type="text" x-model="recipeForm.name_chinese" 
                                class="w-full p-4 border-2 border-slate-200 rounded-xl focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 transition-all font-bold text-lg italic text-indigo-500" 
                                :placeholder="t('chinese_name') + '...'">
                        </div>
                        <div class="space-y-2">
                            <label class="block text-sm font-black text-slate-700 text-teal-400">🇬🇧 <span x-text="'Name (English)'"></span></label>
                            <input type="text" x-model="recipeForm.name_en" 
                                class="w-full p-4 border-2 border-slate-200 rounded-xl focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 transition-all font-bold text-lg italic text-teal-500" 
                                :placeholder="'English name...'">
                        </div>
                        <div class="space-y-2 text-right">
                            <label class="block text-sm font-black text-slate-700">🎯 <span x-text="t('final_product')"></span> <span class="text-red-500">*</span></label>
                            <div class="relative" x-data="{ 
                                open: false, 
                                search: '',
                                init() {
                                    this.$watch('recipeForm.product_id', (val) => {
                                        if (!val) this.search = '';
                                        else {
                                            const p = products.find(p => p.id == val);
                                            if (p) this.search = p.name;
                                        }
                                    });
                                }
                            }">
                                <input type="text" x-model="search" @focus="open = true" @input="open = true" @click.away="setTimeout(() => open = false, 200)"
                                    class="w-full p-4 border-2 border-slate-200 rounded-xl focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 transition-all font-bold text-lg bg-white" 
                                    :placeholder="t('search_product_placeholder')">
                                
                                <div x-show="open" x-transition class="absolute z-50 w-full mt-2 bg-white border-2 border-slate-100 rounded-2xl shadow-2xl max-h-64 overflow-y-auto">
                                    <template x-for="p in (products || []).filter(p => !search || p.name.toLowerCase().includes(search.toLowerCase()) || (p.code && p.code.toLowerCase().includes(search.toLowerCase())) || (p.name_chinese && p.name_chinese.toLowerCase().includes(search.toLowerCase())))" :key="p.id">
                                        <div @click="recipeForm.product_id = p.id; search = p.name; open = false" 
                                            class="p-4 hover:bg-indigo-50 cursor-pointer border-b border-slate-50 last:border-0 transition-colors">
                                            <div class="font-black text-slate-800" x-text="p.name"></div>
                                            <div class="text-[10px] text-indigo-400 font-bold" x-text="(p.code ? t('product_code') + ': ' + p.code : '')"></div>
                                        </div>
                                    </template>
                                    <div x-show="products.filter(p => !search || p.name.includes(search) || (p.code && p.code.includes(search))).length === 0" 
                                        class="p-4 text-center text-slate-400 font-bold" x-text="t('no_results')">
                                    </div>
                                </div>
                            </div>
                            <!-- Hidden Select for form validation/sync if needed, though $model works fine -->
                            <input type="hidden" x-model="recipeForm.product_id" required>
                        </div>
                        <div class="space-y-2">
                            <label class="block text-sm font-black text-slate-700">⚖️ <span x-text="t('batch_output_qty')"></span> <span class="text-red-500">*</span></label>
                            <div class="relative">
                                <input type="number" step="0.01" x-model="recipeForm.base_quantity" required 
                                    class="w-full p-4 border-2 border-slate-200 rounded-xl focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 transition-all font-bold text-lg" 
                                    placeholder="0.00">
                                <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 font-bold" x-text="t('unit')"></span>
                            </div>
                        </div>
                        <div class="space-y-2">
                            <label class="block text-sm font-black text-slate-700 font-black">💰 <span x-text="t('suggested_selling_price')"></span> <span class="text-emerald-500">*</span></label>
                            <div class="relative">
                                <input type="number" step="0.01" x-model="recipeForm.selling_price" required 
                                    class="w-full p-4 border-2 border-emerald-200 rounded-xl focus:border-emerald-500 focus:ring-4 focus:ring-emerald-500/10 transition-all font-black text-2xl text-emerald-700 bg-emerald-50/30" 
                                    placeholder="0.00">
                                <span class="absolute left-4 top-1/2 -translate-y-1/2 text-emerald-300 font-bold italic" x-text="t('currency')"></span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Live Financial Summary Card -->
                <div class="bg-indigo-900 rounded-[3rem] p-8 text-white shadow-2xl shadow-indigo-200 relative overflow-hidden group">
                    <div class="absolute top-0 right-0 w-64 h-64 bg-white/5 rounded-full -translate-y-1/2 translate-x-1/2 blur-3xl group-hover:bg-white/10 transition-colors"></div>
                    <div class="relative z-10">
                        <div class="flex items-center gap-3 mb-8">
                            <span class="text-3xl">💹</span>
                            <h3 class="text-2xl font-black" x-text="t('live_financial_analysis')"></h3>
                        </div>
                        
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
                            <div class="bg-white/10 p-6 rounded-[2rem] border border-white/10 backdrop-blur-sm">
                                <div class="text-[10px] uppercase font-black text-indigo-200 mb-2" x-text="t('unit_total_cost')"></div>
                                <div class="flex items-baseline gap-2">
                                    <span class="text-4xl font-black text-white" x-text="formatMoney(getRecipeSummary()?.costPerUnit || 0)"></span>
                                    <span class="text-xs font-bold text-indigo-300 italic" x-text="t('currency')"></span>
                                </div>
                            </div>
                            <div class="bg-white/10 p-6 rounded-[2rem] border border-white/10 backdrop-blur-sm">
                                <div class="text-[10px] uppercase font-black text-emerald-200 mb-2" x-text="t('selling_price')"></div>
                                <div class="flex items-baseline gap-2">
                                    <span class="text-4xl font-black text-emerald-400" x-text="formatMoney(recipeForm.selling_price)"></span>
                                    <span class="text-xs font-bold text-emerald-300 italic" x-text="t('currency')"></span>
                                </div>
                            </div>
                            <div class="p-6 rounded-[2rem] border backdrop-blur-sm transition-colors"
                                :class="getRecipeSummary()?.profit >= 0 ? 'bg-emerald-500/20 border-emerald-400/30' : 'bg-red-500/20 border-red-400/30'">
                                <div class="text-[10px] uppercase font-black mb-2" :class="getRecipeSummary()?.profit >= 0 ? 'text-emerald-200' : 'text-red-200'" x-text="t('profit_per_unit')"></div>
                                <div class="flex items-baseline gap-2">
                                    <span class="text-4xl font-black" :class="getRecipeSummary()?.profit >= 0 ? 'text-emerald-300' : 'text-red-300'" 
                                        x-text="formatMoney(getRecipeSummary()?.profit || 0)"></span>
                                    <span class="text-xs font-bold italic" :class="getRecipeSummary()?.profit >= 0 ? 'text-emerald-200' : 'text-red-200'" x-text="t('currency')"></span>
                                </div>
                            </div>
                            <div class="bg-white/10 p-6 rounded-[2rem] border border-white/10 backdrop-blur-sm">
                                <div class="text-[10px] uppercase font-black text-indigo-200 mb-2" x-text="t('profit_margin')"></div>
                                <div class="flex items-baseline gap-2">
                                    <span class="text-4xl font-black text-amber-400" x-text="(getRecipeSummary()?.margin || 0).toFixed(1) + '%'"></span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Section 2: Industrial & Indirect Costs -->
                <div class="space-y-8">
                    <div class="flex items-center gap-4 mb-2">
                        <span class="bg-emerald-600 text-white w-12 h-12 rounded-2xl flex items-center justify-center font-black shadow-xl shadow-emerald-200/50 text-xl">2</span>
                        <div>
                            <h3 class="text-2xl font-black text-slate-800 uppercase tracking-tight" x-text="t('industrial_costs')"></h3>
                            <p class="text-xs text-emerald-600 font-bold" x-text="t('costs_accuracy_notice')"></p>
                        </div>
                    </div>
                    
                    <!-- Grouped Costs Grid -->
                    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
                        <!-- Operational: Utilities -->
                        <div class="lg:col-span-12 p-8 rounded-[2.5rem] border border-emerald-100 shadow-sm transition-all relative overflow-hidden bg-emerald-50/20">
                            <div class="flex items-center gap-2 mb-8 bg-emerald-100/50 w-fit px-4 py-1.5 rounded-full border border-emerald-200">
                                <span class="text-lg">⚙️</span>
                                <span class="text-sm font-black text-emerald-800" x-text="t('operational_utilities')"></span>
                            </div>
                            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                                <div class="space-y-1">
                                    <label class="block text-[11px] font-black text-emerald-600 mb-2 uppercase tracking-widest px-1" x-text="t('natural_gas')"></label>
                                    <input type="number" step="0.1" x-model="recipeForm.gas_cost" class="w-full p-4 border-2 border-slate-200 rounded-2xl focus:border-emerald-500 focus:ring-4 focus:ring-emerald-500/5 transition-all font-black text-lg bg-white shadow-sm hover:border-slate-300 outline-none" placeholder="0.00">
                                </div>
                                <div class="space-y-1">
                                    <label class="block text-[11px] font-black text-emerald-600 mb-2 uppercase tracking-widest px-1" x-text="t('electricity')"></label>
                                    <input type="number" step="0.1" x-model="recipeForm.electricity_cost" class="w-full p-4 border-2 border-slate-200 rounded-2xl focus:border-emerald-500 focus:ring-4 focus:ring-emerald-500/5 transition-all font-black text-lg bg-white shadow-sm hover:border-slate-300 outline-none" placeholder="0.00">
                                </div>
                                <div class="space-y-1">
                                    <label class="block text-[11px] font-black text-emerald-600 mb-2 uppercase tracking-widest px-1" x-text="t('water')"></label>
                                    <input type="number" step="0.1" x-model="recipeForm.water_cost" class="w-full p-4 border-2 border-slate-200 rounded-2xl focus:border-emerald-500 focus:ring-4 focus:ring-emerald-500/5 transition-all font-black text-lg bg-white shadow-sm hover:border-slate-300 outline-none" placeholder="0.00">
                                </div>
                                <div class="space-y-1">
                                    <label class="block text-[11px] font-black text-emerald-600 mb-2 uppercase tracking-widest px-1" x-text="t('rent')"></label>
                                    <input type="number" step="0.1" x-model="recipeForm.rent_cost" class="w-full p-4 border-2 border-slate-200 rounded-2xl focus:border-emerald-500 focus:ring-4 focus:ring-emerald-500/5 transition-all font-black text-lg bg-white shadow-sm hover:border-slate-300 outline-none" placeholder="0.00">
                                </div>
                            </div>
                        </div>

                        <!-- Marketing -->
                        <div class="lg:col-span-8 p-8 rounded-[2.5rem] border border-purple-100 shadow-sm transition-all relative overflow-hidden bg-purple-50/20">
                            <div class="flex items-center gap-2 mb-8 bg-purple-100/50 w-fit px-4 py-1.5 rounded-full border border-purple-200">
                                <span class="text-lg">📢</span>
                                <span class="text-sm font-black text-purple-800" x-text="t('marketing_admin')"></span>
                            </div>
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                                <div class="space-y-1">
                                    <label class="block text-[11px] font-black text-purple-600 mb-2 uppercase tracking-widest px-1" x-text="t('marketing')"></label>
                                    <input type="number" step="0.1" x-model="recipeForm.marketing_cost" class="w-full p-4 border-2 border-slate-200 rounded-2xl focus:border-purple-500 focus:ring-4 focus:ring-purple-500/5 transition-all font-black text-lg bg-white shadow-sm hover:border-slate-300 outline-none" placeholder="0.00">
                                </div>
                                <div class="space-y-1">
                                    <label class="block text-[11px] font-black text-purple-600 mb-2 uppercase tracking-widest px-1" x-text="t('advertising')"></label>
                                    <input type="number" step="0.1" x-model="recipeForm.ad_cost" class="w-full p-4 border-2 border-slate-200 rounded-2xl focus:border-purple-500 focus:ring-4 focus:ring-purple-500/5 transition-all font-black text-lg bg-white shadow-sm hover:border-slate-300 outline-none" placeholder="0.00">
                                </div>
                                <div class="space-y-1">
                                    <label class="block text-[11px] font-black text-purple-600 mb-2 uppercase tracking-widest px-1" x-text="t('admin_expenses')"></label>
                                    <input type="number" step="0.1" x-model="recipeForm.admin_cost" class="w-full p-4 border-2 border-slate-200 rounded-2xl focus:border-purple-500 focus:ring-4 focus:ring-purple-500/5 transition-all font-black text-lg bg-white shadow-sm hover:border-slate-300 outline-none" placeholder="0.00">
                                </div>
                            </div>
                        </div>

                        <!-- Fees & Taxes -->
                        <div class="lg:col-span-4 p-8 rounded-[2.5rem] border border-slate-200 border-dashed shadow-sm transition-all relative overflow-hidden bg-slate-50">
                            <div class="flex items-center gap-2 mb-8 bg-slate-200/50 w-fit px-4 py-1.5 rounded-full border border-slate-300">
                                <span class="text-lg">💰</span>
                                <span class="text-sm font-black text-slate-700" x-text="t('taxes_fees')"></span>
                            </div>
                            <div class="grid grid-cols-2 gap-4">
                                <div class="space-y-1">
                                    <label class="block text-[11px] font-black text-red-500 mb-2 uppercase tracking-widest px-1" x-text="t('taxes_title')"></label>
                                    <input type="number" step="0.1" x-model="recipeForm.taxes" class="w-full p-4 border-2 border-slate-200 rounded-2xl focus:border-red-500 focus:ring-4 focus:ring-red-500/5 transition-all font-black text-lg bg-white shadow-sm hover:border-slate-300 outline-none" placeholder="0.00">
                                </div>
                                <div class="space-y-1">
                                    <label class="block text-[11px] font-black text-blue-500 mb-2 uppercase tracking-widest px-1" x-text="t('import_costs')"></label>
                                    <input type="number" step="0.1" x-model="recipeForm.import_costs" class="w-full p-4 border-2 border-slate-200 rounded-2xl focus:border-blue-500 focus:ring-4 focus:ring-blue-500/5 transition-all font-black text-lg bg-white shadow-sm hover:border-slate-300 outline-none" placeholder="0.00">
                                </div>
                                <div class="col-span-2 space-y-1 mt-2">
                                    <label class="block text-[11px] font-black text-slate-500 mb-2 uppercase tracking-widest px-1" x-text="t('other')"></label>
                                    <input type="number" step="0.1" x-model="recipeForm.other_costs" class="w-full p-4 border-2 border-slate-200 rounded-2xl focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/5 transition-all font-black text-lg bg-white shadow-sm hover:border-slate-300 outline-none" placeholder="0.00">
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Direct Labor & Overhead -->
                    <div class="p-8 bg-gradient-to-r from-slate-100/50 via-white to-slate-100/50 rounded-[3rem] border border-slate-200 flex flex-wrap gap-12 justify-center shadow-inner">
                         <div class="flex items-center gap-6">
                             <div class="w-16 h-16 rounded-3xl bg-indigo-600 text-white flex items-center justify-center text-3xl shadow-xl shadow-indigo-100 flex-shrink-0 animate-pulse">👷</div>
                             <div class="space-y-1">
                                 <label class="block text-xs font-black text-slate-400 uppercase tracking-widest" x-text="t('direct_labor')"></label>
                                 <div class="flex items-baseline gap-2">
                                     <input type="number" step="1" x-model="recipeForm.labor_cost" class="bg-transparent text-3xl font-black text-indigo-900 focus:outline-none border-b-4 border-indigo-100 focus:border-indigo-600 w-32 pb-1 transition-all">
                                     <span class="text-sm font-black text-slate-300" x-text="t('currency')"></span>
                                 </div>
                             </div>
                         </div>
                         <div class="flex items-center gap-6">
                             <div class="w-16 h-16 rounded-3xl bg-amber-500 text-white flex items-center justify-center text-3xl shadow-xl shadow-amber-100 flex-shrink-0">🔧</div>
                             <div class="space-y-1">
                                 <label class="block text-xs font-black text-slate-400 uppercase tracking-widest" x-text="t('industrial_overhead')"></label>
                                 <div class="flex items-baseline gap-2">
                                     <input type="number" step="1" x-model="recipeForm.overhead_cost" class="bg-transparent text-3xl font-black text-slate-700 focus:outline-none border-b-4 border-slate-100 focus:border-slate-400 w-32 pb-1 transition-all">
                                     <span class="text-sm font-black text-slate-300" x-text="t('currency')"></span>
                                 </div>
                             </div>
                         </div>
                    </div>
                </div>

                <!-- Section 3: Ingredients / Raw Materials -->
                <div class="section-container border-t-2 border-amber-100 pt-10 mt-10">
                    <div class="flex flex-col items-center text-center mb-10">
                        <div class="bg-amber-100 w-20 h-20 rounded-[2rem] flex items-center justify-center mb-6 shadow-inner relative">
                            <span class="bg-amber-600 text-white w-14 h-14 rounded-2xl flex items-center justify-center font-black shadow-xl shadow-amber-200/60 text-2xl relative z-10">3</span>
                            <div class="absolute inset-0 bg-amber-400/20 rounded-[2rem] animate-ping opacity-20"></div>
                        </div>
                        <h3 class="text-3xl font-black text-slate-800 uppercase tracking-tight mb-3" x-text="t('ingredients_raw')"></h3>
                        <p class="text-sm text-amber-600 font-bold max-w-lg mx-auto mb-8" x-text="t('add_all_materials_notice')"></p>
                        
                        <button type="button" @click="addRecipeItem()" 
                            class="bg-amber-600 text-white px-12 py-4 rounded-[2rem] transition-all font-black flex items-center gap-4 shadow-2xl shadow-amber-200 hover:-translate-y-1.5 hover:shadow-amber-300 active:scale-95 group">
                            <span class="text-3xl group-hover:rotate-90 transition-transform">+</span>
                            <span class="text-lg" x-text="t('add_ingredient')"></span>
                        </button>
                    </div>

                    <div class="bg-white rounded-[3rem] shadow-xl shadow-slate-200/60 border border-slate-100 overflow-hidden mb-10">
                        <table class="w-full text-right border-collapse">
                            <thead>
                                <tr class="bg-slate-50/80 border-b-2 border-slate-100">
                                    <th class="p-8 text-xs font-black text-slate-400 uppercase tracking-widest text-right">📦 <span x-text="t('raw_material')"></span></th>
                                    <th class="w-48 p-8 text-xs font-black text-slate-400 uppercase tracking-widest text-center">⚖️ <span x-text="t('qty_used')"></span></th>
                                    <th class="w-40 p-8 text-xs font-black text-slate-400 uppercase tracking-widest text-center">♻️ <span x-text="t('waste_pct')"></span></th>
                                    <th class="w-24 p-8 text-center"></th>
                                </tr>
                            </thead>
                            <tbody class="divide-y-2 divide-slate-50">
                                <template x-for="(item, index) in recipeForm.items" :key="index">
                                    <tr class="group hover:bg-amber-50/40 transition-all duration-300">
                                        <td class="p-6">
                                            <div class="relative" x-data="{ 
                                                open: false, 
                                                search: '',
                                                init() {
                                                    const initialProduct = (products || []).find(p => p.id == item.material_product_id);
                                                    this.search = initialProduct ? locName(initialProduct) : '';
                                                    this.$watch('item.material_product_id', (val) => {
                                                        const p = (products || []).find(x => x.id == val);
                                                        if (p) this.search = locName(p);
                                                    });
                                                }
                                            }">
                                                <div class="relative group/search">
                                                    <input type="text" x-model="search" @focus="open = true" @input="open = true" @click.away="setTimeout(() => open = false, 200)"
                                                        class="w-full p-5 pl-14 border-2 border-slate-100 rounded-[1.5rem] focus:border-amber-500 focus:ring-8 focus:ring-amber-500/5 transition-all font-bold bg-slate-50/50 group-hover/search:bg-white outline-none text-slate-700 text-lg shadow-inner" 
                                                        :placeholder="t('search_product_placeholder')">
                                                    <span class="absolute left-6 top-1/2 -translate-y-1/2 text-xl text-slate-300 group-hover/search:text-amber-500 transition-colors">🔍</span>
                                                </div>
                                                
                                                <div x-show="open" x-transition:enter="transition ease-out duration-200"
                                                     x-transition:enter-start="opacity-0 translate-y-4"
                                                     x-transition:enter-end="opacity-100 translate-y-0"
                                                     class="absolute z-[100] w-full mt-3 bg-white border-2 border-amber-100 rounded-[2.5rem] shadow-[0_20px_50px_rgba(0,0,0,0.15)] max-h-72 overflow-y-auto p-3 backdrop-blur-xl">
                                                    <template x-for="p in (products || []).filter(p => !search || p.name.toLowerCase().includes(search.toLowerCase()) || (p.name_chinese && p.name_chinese.toLowerCase().includes(search.toLowerCase())) || (p.code && p.code.toLowerCase().includes(search.toLowerCase())))" :key="p.id">
                                                        <div @click="item.material_product_id = p.id; search = locName(p); open = false" 
                                                            class="p-4 hover:bg-amber-50 rounded-2xl cursor-pointer border-b border-slate-50 last:border-0 transition-all flex justify-between items-center group/item mb-1">
                                                            <div>
                                                                <div class="text-base font-black text-slate-800" x-text="locName(p)"></div>
                                                                <div class="text-[11px] text-amber-500 font-bold" x-show="lang !== 'zh' && p.name_chinese" x-text="p.name_chinese"></div>
                                                            </div>
                                                            <div class="bg-slate-100 text-slate-400 text-[10px] px-3 py-1.5 rounded-xl group-hover/item:bg-amber-100 group-hover/item:text-amber-600 font-black transition-colors" x-text="p.unit || ''"></div>
                                                        </div>
                                                    </template>
                                                    <div x-show="(products || []).filter(p => !search || p.name.toLowerCase().includes(search.toLowerCase())).length === 0" 
                                                        class="p-8 text-center text-slate-300 font-black italic" x-text="t('no_results')">
                                                    </div>
                                                </div>
                                            </div>
                                        </td>
                                        <td class="p-6">
                                            <div class="relative group/qty">
                                                <input type="number" step="0.01" x-model="item.quantity" required 
                                                    class="w-full p-5 border-2 border-slate-100 rounded-[1.5rem] focus:border-amber-500 transition-all text-center font-black text-slate-700 bg-slate-50/50 group-hover/qty:bg-white outline-none text-xl shadow-inner" 
                                                    placeholder="0.00">
                                                <span class="absolute left-5 top-1/2 -translate-y-1/2 text-xs font-black text-slate-300 group-hover/qty:text-amber-400 transition-colors" x-text="products.find(p => p.id == item.material_product_id)?.unit || ''"></span>
                                            </div>
                                        </td>
                                        <td class="p-6">
                                            <div class="relative group/waste">
                                                <input type="number" step="1" x-model="item.waste_pct" 
                                                    class="w-full p-5 border-2 border-slate-100 rounded-[1.5rem] focus:border-red-400 transition-all text-center font-black text-red-600 bg-slate-50/50 group-hover/waste:bg-white outline-none text-xl shadow-inner" 
                                                    placeholder="0">
                                                <span class="absolute left-6 top-1/2 -translate-y-1/2 text-sm font-black text-red-300 group-hover/waste:text-red-500 transition-colors">%</span>
                                            </div>
                                        </td>
                                        <td class="p-6 text-center">
                                            <button type="button" @click="removeRecipeItem(index)" 
                                                class="w-14 h-14 flex items-center justify-center text-red-300 hover:text-white hover:bg-red-500 rounded-2xl transition-all duration-300 active:scale-90 border-2 border-transparent hover:border-red-600 hover:shadow-xl hover:shadow-red-100">
                                                <span class="text-2xl">🗑️</span>
                                            </button>
                                        </td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                        <div x-show="recipeForm.items.length === 0" class="flex flex-col items-center justify-center p-24 text-slate-200 space-y-6">
                            <div class="text-8xl grayscale opacity-10 animate-pulse">🥣</div>
                            <p class="font-black text-xl text-slate-300 uppercase tracking-[0.2em]" x-text="t('no_ingredients_notice')"></p>
                        </div>
                    </div>
                </div>
            </form>
        </div>
        <div class="p-8 border-t bg-slate-50 flex justify-end gap-4">
            <button @click="recipeModalOpen = false" class="px-6 py-2 text-slate-600 font-bold" x-text="t('cancel')"></button>
            <button type="submit" form="recipeForm" class="px-8 py-2 bg-indigo-600 text-white rounded-xl font-bold" x-text="isEditingRecipe ? t('save_changes') : t('save_final_recipe')"></button>
        </div>
    </div>
</div>

<!-- Recipe Details Modal -->
<div x-show="recipeDetailsModalOpen" x-cloak class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm">
    <div @click.away="recipeDetailsModalOpen = false" class="bg-white rounded-3xl shadow-2xl w-full max-w-[90vw] flex flex-col max-h-[95vh]">
        <div class="p-8 border-b bg-slate-50 rounded-t-3xl flex justify-between items-center" x-if="selectedRecipe">
            <div>
                <h2 class="text-2xl font-black text-slate-800" x-text="t('recipe_items_title') + ' ' + selectedRecipe.name"></h2>
                <div class="text-indigo-400 font-bold" x-text="selectedRecipe.name_chinese"></div>
            </div>
            <button @click="recipeDetailsModalOpen = false" class="text-3xl text-slate-400 hover:text-slate-600 font-bold">&times;</button>
        </div>
        <div class="p-8 overflow-y-auto flex-1" x-if="selectedRecipe">
            <table class="w-full text-right border-collapse">
                <thead class="bg-slate-50/80 border-b-2 border-slate-100">
                    <tr>
                        <th class="p-6 text-xs font-black text-slate-400 uppercase tracking-widest" x-text="t('raw_material')"></th>
                        <th class="p-6 text-xs font-black text-slate-400 uppercase tracking-widest text-center" x-text="t('qty_used')"></th>
                        <th class="p-6 text-xs font-black text-slate-400 uppercase tracking-widest text-center" x-text="t('waste_pct')"></th>
                    </tr>
                </thead>
                <tbody class="divide-y-2 divide-slate-50">
                    <template x-for="item in selectedRecipe.items">
                        <tr class="hover:bg-indigo-50/30 transition-colors duration-300">
                            <td class="p-5">
                                <div class="font-black text-slate-700" x-text="getProductName(item.material_product_id)"></div>
                                <div class="text-[11px] text-indigo-400 font-bold italic" x-show="lang !== 'zh' && products.find(p => p.id == item.material_product_id)?.name_chinese" x-text="products.find(p => p.id == item.material_product_id)?.name_chinese"></div>
                            </td>
                            <td class="p-5 text-center">
                                <span class="bg-indigo-50 text-indigo-700 px-4 py-2 rounded-xl font-black text-lg inline-block min-w-[80px]" x-text="item.quantity"></span>
                                <span class="text-[10px] text-slate-400 font-bold block mt-1" x-text="products.find(p => p.id == item.material_product_id)?.unit"></span>
                            </td>
                            <td class="p-5 text-center">
                                <span class="text-red-500 font-black text-lg" x-text="(item.waste_pct * 100).toFixed(0) + '%'"></span>
                                <div class="w-16 h-1.5 bg-slate-100 rounded-full mx-auto mt-2 overflow-hidden border border-slate-200">
                                    <div class="h-full bg-red-400 rounded-full" :style="'width: ' + Math.min(item.waste_pct * 100, 100) + '%'"></div>
                                </div>
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>
        <div class="p-6 border-t bg-slate-50 flex justify-end">
            <button @click="recipeDetailsModalOpen = false" class="px-8 py-2 bg-slate-800 text-white rounded-xl font-bold" x-text="t('close_window')"></button>
        </div>
    </div>
</div>
</div>

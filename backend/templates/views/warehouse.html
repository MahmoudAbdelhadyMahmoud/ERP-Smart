<div x-show="view === 'warehouse'" x-cloak>
    <!-- Warehouse Dashboard Cards -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
        <div class="bg-indigo-600 text-white p-6 rounded-2xl shadow-lg shadow-indigo-100 flex items-center justify-between">
            <div>
                <div class="text-indigo-100 text-sm font-bold mb-1" x-text="t('total_stock_value')"></div>
                <div class="text-3xl font-black"
                    x-text="formatMoney(products.reduce((s,p) => s + (p.current_stock * p.average_cost), 0)) + ' ' + t('currency')">
                </div>
            </div>
            <span class="text-4xl opacity-30">📦</span>
        </div>
        <div @click="toggleLowStockFilter()" class="bg-amber-500 text-white p-6 rounded-2xl shadow-lg shadow-amber-100 flex items-center justify-between cursor-pointer hover:scale-[1.02] transition-transform active:scale-95"
            :class="(products.filter(p => p.current_stock <= p.reorder_level).length > 0 ? 'bg-red-500' : '') + (showOnlyLowStock ? ' ring-4 ring-white ring-offset-2 shadow-2xl scale-[1.05]' : '')">
            <div>
                <div class="text-amber-50 text-sm font-bold mb-1 font-black" x-text="t('low_stock_items')"></div>
                <div class="text-3xl font-black"
                    x-text="products.filter(p => p.current_stock <= p.reorder_level).length + ' ' + t('items_count')">
                </div>
            </div>
            <span class="text-4xl opacity-30" x-text="showOnlyLowStock ? '🔍' : '⚠️'"></span>
        </div>
    </div>

    <!-- Sub-navigation for Warehouse -->
    <div class="flex gap-4 mb-6 border-b pb-2">
        <button @click="warehouseView = 'movements'" class="px-4 py-2 font-bold transition whitespace-nowrap"
            :class="warehouseView === 'movements' ? 'border-b-4 border-indigo-600 text-indigo-700' : 'text-gray-400'" x-text="t('warehouse_balances_movements')"></button>
        <button @click="warehouseView = 'items'" class="px-4 py-2 font-bold transition whitespace-nowrap"
            :class="warehouseView === 'items' ? 'border-b-4 border-indigo-600 text-indigo-700' : 'text-gray-400'" x-text="t('register_codes_items')"></button>
        <button @click="warehouseView = 'locations'" class="px-4 py-2 font-bold transition whitespace-nowrap"
            :class="warehouseView === 'locations' ? 'border-b-4 border-indigo-600 text-indigo-700' : 'text-gray-400'" x-text="t('locations')"></button>
        <button @click="warehouseView = 'transfers'" class="px-4 py-2 font-bold transition whitespace-nowrap"
            :class="warehouseView === 'transfers' ? 'border-b-4 border-indigo-600 text-indigo-700' : 'text-gray-400'" x-text="t('transfers')"></button>
        <button @click="warehouseView = 'bulk_entry'" class="px-4 py-2 font-bold transition whitespace-nowrap"
            :class="warehouseView === 'bulk_entry' ? 'border-b-4 border-indigo-600 text-indigo-700' : 'text-gray-400'" x-text="t('bulk_entry_long')"></button>
    </div>

    <!-- Item Registration Section -->
    <div x-show="warehouseView === 'items'">
        <!-- Stock Analysis Chart -->
        <div class="bg-white p-6 rounded-xl shadow-lg border mb-8">
            <h3 class="font-bold mb-4 flex items-center gap-2 text-indigo-900">
                <span class="text-xl">📊</span>
                <span x-text="t('stock_analysis_chart')"></span>
            </h3>
            <div id="stockChartContainer" class="relative w-full h-80 min-h-[300px]">
                <canvas id="stockChart"></canvas>
            </div>
        </div>

        <!-- Product Registration -->
        <div class="bg-white p-6 rounded-xl shadow-lg border-r-4 border-indigo-500 mb-8">
            <h3 class="font-bold mb-6 flex items-center gap-2 text-indigo-900 text-xl">
                <span class="bg-indigo-100 p-2 rounded-lg text-lg">📦</span>
                <span x-text="isEditingProduct ? t('edit_product_data') : t('register_new_product')"></span>
            </h3>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <label class="block text-sm font-bold text-gray-600 mb-1" x-text="t('product_code')"></label>
                    <input type="text" x-model="newProduct.code" :placeholder="t('auto_generated')"
                        class="w-full border-2 p-3 rounded-xl focus:border-indigo-500 outline-none transition bg-gray-50"
                        :disabled="isEditingProduct">
                </div>
                <div class="md:col-span-1">
                    <label class="block text-sm font-bold text-gray-600 mb-1" x-text="t('product_name')"></label>
                    <input type="text" x-model="newProduct.name" 
                        @input.debounce.500ms="translateText(newProduct.name, (val) => { newProduct.name_chinese = val.zh; newProduct.name_en = val.en; })"
                        :placeholder="t('product_name')"
                        class="w-full border-2 p-3 rounded-xl focus:border-indigo-500 outline-none transition">
                </div>
                <div class="md:col-span-1">
                    <label class="block text-sm font-bold text-gray-600 mb-1" x-text="t('chinese_name')"></label>
                    <input type="text" x-model="newProduct.name_chinese" :placeholder="t('chinese_name') + '...'"
                        class="w-full border-2 p-3 rounded-xl focus:border-indigo-500 outline-none transition italic text-gray-400">
                </div>
                <div class="md:col-span-1">
                    <label class="block text-sm font-bold text-gray-600 mb-1" x-text="'Name (English)'"></label>
                    <input type="text" x-model="newProduct.name_en" :placeholder="'Name (English)...'"
                        class="w-full border-2 p-3 rounded-xl focus:border-indigo-500 outline-none transition italic text-gray-400">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-600 mb-1" x-text="t('unit')"></label>
                    <input type="text" x-model="newProduct.unit" :placeholder="t('unit_placeholder')"
                        list="unitSuggestions"
                        class="w-full border-2 p-3 rounded-xl focus:border-indigo-500 outline-none transition">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-600 mb-1" x-text="t('avg_cost_auto')"></label>
                    <input type="number" x-model="newProduct.average_cost" placeholder="0.00"
                        class="w-full border-2 p-3 rounded-xl focus:border-indigo-500 outline-none transition bg-blue-50 font-bold"
                        readonly :title="t('avg_cost_help')">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-600 mb-1" x-text="t('last_purchase_price')"></label>
                    <input type="number" x-model="newProduct.purchase_price" placeholder="0.00"
                        class="w-full border-2 p-3 rounded-xl focus:border-indigo-500 outline-none transition bg-green-50 font-bold"
                        readonly :title="t('last_purchase_help')">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-600 mb-1" x-text="t('reorder_level')"></label>
                    <input type="number" x-model="newProduct.reorder_level" placeholder="0.00"
                        class="w-full border-2 p-3 rounded-xl focus:border-red-400 outline-none transition bg-red-50/30">
                </div>
                <div class="md:col-span-2">
                    <label class="block text-sm font-bold text-gray-600 mb-1" x-text="t('product_notes')"></label>
                    <textarea x-model="newProduct.notes" :placeholder="t('notes_help')"
                        class="w-full border-2 p-3 rounded-xl focus:border-indigo-500 outline-none transition h-[52px] resize-none"></textarea>
                </div>
                <div class="md:col-span-3 flex gap-2">
                    <button @click="addProduct()"
                        class="bg-indigo-600 text-white px-6 py-4 rounded-xl flex-1 font-black text-lg hover:bg-indigo-700 shadow-lg transition">
                        <span x-text="isEditingProduct ? t('update_product') : t('save_new_product')"></span>
                    </button>
                    <template x-if="isEditingProduct">
                        <button @click="resetProduct()"
                            class="bg-gray-400 text-white px-6 py-4 rounded-xl font-bold hover:bg-gray-500 shadow-lg transition" x-text="t('cancel')"></button>
                    </template>
                </div>
            </div>
        </div>

        <!-- Registered Items List -->
        <div class="bg-white rounded-xl shadow overflow-hidden border">
            <div class="p-4 bg-gray-50 border-b font-bold" x-text="t('registered_items_list')"></div>
            <table class="w-full text-right">
                <thead class="bg-gray-100 text-sm">
                    <tr>
                        <th class="p-4" x-text="t('product_code')"></th>
                        <th class="p-4" x-text="t('product_name') + ' (AR)'"></th>
                        <th class="p-4" x-text="t('product_name') + ' (CH)'"></th>
                        <th class="p-4" x-text="t('unit')"></th>
                        <th class="p-4" x-text="t('total_value')"></th>
                        <th class="p-4" x-text="t('reorder_level')"></th>
                        <th class="p-4" x-text="t('avg_cost')"></th>
                        <th class="p-4" x-text="t('actions')"></th>
                    </tr>
                </thead>
                <tbody>
                    <template x-for="p in products" :key="p.id">
                        <tr class="border-b hover:bg-gray-50 text-sm"
                            :class="p.current_stock <= p.reorder_level ? 'bg-red-50' : ''">
                            <td class="p-4 text-gray-400 font-mono" x-text="p.code || ('#' + p.id)"></td>
                            <td class="p-4 font-bold" x-text="locName(p)"></td>
                            <td class="p-4 text-indigo-600 italic text-[10px]" x-show="lang !== 'zh' && p.name_chinese" x-text="p.name_chinese || '-'"></td>
                            <td class="p-4 text-gray-600" x-text="p.unit"></td>
                            <td class="p-4 font-black"
                                :class="p.current_stock <= p.reorder_level ? 'text-red-600' : 'text-indigo-600'"
                                x-text="p.current_stock"></td>
                            <td class="p-4 text-red-400 font-bold" x-text="p.reorder_level"></td>
                            <td class="p-4 text-gray-900 font-bold" x-text="formatMoney(p.average_cost)"></td>
                            <td class="p-4 flex gap-1">
                                <button @click="showPriceHistory(p)" class="bg-indigo-50 text-indigo-600 px-3 py-1 rounded-lg border border-indigo-200 hover:bg-indigo-100 transition font-bold text-xs" :title="t('price_history')">📊 <span x-text="t('price_label')"></span></button>
                                <button @click="editProduct(p)" class="bg-blue-50 text-blue-600 px-3 py-1 rounded-lg border border-blue-200 hover:bg-blue-100 transition font-bold text-xs" x-text="t('edit')"></button>
                                <button @click="deleteProduct(p.id)" class="bg-red-50 text-red-600 px-3 py-1 rounded-lg border border-red-200 hover:bg-red-100 transition font-bold text-xs" x-text="t('delete')"></button>
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Movements Section -->
    <div x-show="warehouseView === 'movements'">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-xl shadow-lg border-r-4 border-green-500 md:col-span-1">
                <h3 class="font-bold mb-4 flex items-center gap-2">
                    <span>🔄</span> <span x-text="isEditingMovement ? t('edit_movement_title') : t('register_movement_title')"></span>
                </h3>
                <div class="space-y-4">
                    <div class="relative" x-data="{ 
                        open: false, 
                        search: '',
                        init() {
                            this.$watch('newMovement.product_id', (val) => {
                                if (!val) this.search = '';
                                else {
                                    const p = products.find(p => p.id == val);
                                    if (p) this.search = (p.code ? '[' + p.code + '] ' : '') + locName(p);
                                }
                            });
                        }
                    }">
                        <label class="block text-xs text-gray-500 mb-1 font-bold" x-text="t('product_name')"></label>
                        <input type="text" x-model="search" @focus="open = true" @input="open = true" @click.away="setTimeout(() => open = false, 200)"
                            :placeholder="t('search_movements_placeholder')"
                            class="w-full border-2 p-3 rounded-xl focus:border-indigo-500 outline-none transition font-bold text-sm bg-white"
                            :disabled="isEditingMovement">
                        
                        <div x-show="open" x-transition class="absolute z-50 w-full mt-2 bg-white border-2 border-slate-100 rounded-2xl shadow-2xl max-h-64 overflow-y-auto">
                            <template x-for="p in products.filter(p => !search || p.name.includes(search) || (p.code && p.code.includes(search)))" :key="p.id">
                                <div @click="newMovement.product_id = p.id; search = (p.code ? '[' + p.code + '] ' : '') + locName(p); open = false" 
                                    class="p-4 hover:bg-indigo-50 cursor-pointer border-b border-slate-50 last:border-0 transition-colors text-right">
                                    <div class="font-black text-slate-800" x-text="locName(p)"></div>
                                    <div class="flex justify-between items-center mt-1">
                                        <div class="text-[10px] text-indigo-400 font-bold" x-text="p.code ? t('product_code') + ': ' + p.code : ''"></div>
                                        <div class="text-[10px] text-gray-400 font-bold" x-text="t('available_stock') + ': ' + p.current_stock + ' ' + (p.unit || '')"></div>
                                    </div>
                                    <div class="text-[10px] text-indigo-400 italic" x-show="lang !== 'zh' && p.name_chinese" x-text="p.name_chinese"></div>
                                </div>
                            </template>
                            <div x-show="products.filter(p => !search || p.name.includes(search) || (p.code && p.code.includes(search))).length === 0" 
                                class="p-4 text-center text-slate-400 font-bold" x-text="t('no_results')">
                            </div>
                        </div>
                    </div>
                    <select x-model="newMovement.location_id" class="w-full border p-2 rounded-lg">
                        <option value="" x-text="t('select_warehouse')"></option>
                        <template x-for="loc in locations" :key="loc.id">
                            <option :value="loc.id" x-text="locName(loc)"></option>
                        </template>
                    </select>
                    <select x-model="newMovement.type" class="w-full border p-2 rounded-lg font-bold">
                        <option value="Addition" x-text="t('addition_type')"></option>
                        <option value="Disposal" x-text="t('disposal_type')"></option>
                        <option value="Adjustment" x-text="t('adjustment_type')"></option>
                    </select>
                    <div>
                        <label class="block text-xs text-gray-500 mb-1 font-bold" x-text="t('qty_label')"></label>
                        <input type="number" x-model="newMovement.quantity" :placeholder="t('qty_label')" class="w-full border p-2 rounded-lg">
                    </div>
                    <template x-if="newMovement.type === 'Addition'">
                        <div>
                            <label class="block text-xs text-gray-500 mb-1 font-bold" x-text="t('price_label')"></label>
                            <input type="number" x-model="newMovement.unit_price" :placeholder="t('unit_price_optional')"
                                class="w-full border p-2 rounded-lg bg-indigo-50 border-indigo-200">
                        </div>
                    </template>
                    <input type="date" x-model="newMovement.date" class="w-full border p-2 rounded-lg">
                    <textarea x-model="newMovement.notes" :placeholder="t('description')" class="w-full border p-2 rounded-lg text-sm" rows="2"></textarea>
                    <div class="flex gap-2">
                        <button @click="addMovement()"
                            class="bg-green-600 text-white px-6 py-2 rounded-lg flex-1 font-bold hover:bg-green-700 transition"
                            x-text="isEditingMovement ? t('update_button') : t('register_movement_title') + ' 📤'"></button>
                        <button x-show="isEditingMovement" @click="resetMovementForm()"
                            class="bg-gray-200 px-4 py-2 rounded-lg hover:bg-gray-300 transition text-sm" x-text="t('cancel')"></button>
                    </div>
                </div>
            </div>

            <!-- Products Table -->
            <div id="products-inventory-table" 
                class="bg-white rounded-xl shadow-lg border md:col-span-2 overflow-hidden transition-all duration-700"
                :class="flashTable ? 'ring-8 ring-indigo-500 shadow-[0_0_50px_rgba(79,70,229,0.3)] scale-[1.02]' : ''">
                <div class="p-4 border-b bg-gray-50 flex justify-between items-center">
                    <h3 class="font-bold" x-text="t('current_stock_balances')"></h3>
                    <div class="flex gap-2">
                        <!-- Template & Import -->
                        <div class="flex border rounded-lg overflow-hidden border-indigo-200 text-[10px] font-bold">
                            <button @click="window.location.href='/products/template'" class="bg-white text-indigo-600 px-3 py-1 hover:bg-indigo-50" x-text="t('export_excel') + ' 📄'"></button>
                            <button @click="$refs.productFile.click()" class="bg-indigo-600 text-white px-3 py-1 hover:bg-indigo-700" x-text="t('view_register_expense') + ' ⬆️'"></button>
                            <input type="file" x-ref="productFile" class="hidden" @change="importProducts($event)">
                        </div>
                        <button @click="window.location.href='/export/warehouse/pdf'" class="bg-red-50 text-red-600 px-3 py-1 rounded-lg border border-red-200 hover:bg-red-100 font-bold text-[10px]" x-text="'PDF 🖨️'"></button>
                        <button @click="window.location.href='/export/warehouse/excel'" class="bg-green-50 text-green-600 px-3 py-1 rounded-lg border border-green-200 hover:bg-green-100 font-bold text-[10px]" x-text="'Excel 📊'"></button>
                        <button @click="recalculateStock()" class="text-[9px] bg-red-50 text-red-600 px-2 py-1 rounded border border-red-100 hover:bg-red-100" x-text="t('sync_recalculate')"></button>
                        <button @click="fetchWarehouseData()" class="text-[9px] bg-indigo-50 text-indigo-600 px-2 py-1 rounded" x-text="t('refresh_data')"></button>
                    </div>
                </div>
                <div class="overflow-y-auto max-h-[400px]">
                    <table class="w-full text-right">
                        <thead class="bg-gray-100 sticky top-0">
                            <tr>
                                <th class="p-4" x-text="t('product_code')"></th>
                                <th class="p-4" x-text="t('product_name')"></th>
                                <th class="p-4 text-center" x-text="t('stock')"></th>
                                <th class="p-4 text-center" x-text="t('reorder_level')"></th>
                                <th class="p-4" x-text="t('unit')"></th>
                            </tr>
                        </thead>
                        <tbody>
                            <template x-for="p in products.filter(p => !showOnlyLowStock || p.current_stock <= p.reorder_level)" :key="p.id">
                                <tr class="border-b transition relative"
                                    :class="{
                                        'bg-red-50/50 hover:bg-red-100/50': p.current_stock <= p.reorder_level,
                                        'hover:bg-indigo-50 cursor-pointer': p.current_stock > p.reorder_level,
                                        'bg-indigo-100': movementFilterProductId === p.id && p.current_stock > p.reorder_level,
                                        'bg-red-200/50': movementFilterProductId === p.id && p.current_stock <= p.reorder_level
                                    }"
                                    @click="movementFilterProductId = (movementFilterProductId === p.id ? null : p.id)">
                                    <td class="p-4 text-xs font-mono text-gray-400" x-text="p.code"></td>
                                    <td class="p-4">
                                        <div class="font-bold" x-text="locName(p)"></div>
                                        <div class="text-[10px] text-indigo-400 italic" x-show="lang !== 'zh' && p.name_chinese" x-text="p.name_chinese"></div>
                                    </td>
                                    <td class="p-4 text-center">
                                        <span class="font-black text-lg" 
                                              :class="p.current_stock <= p.reorder_level ? 'text-red-700' : 'text-indigo-700'"
                                              x-text="p.current_stock"></span>
                                        <template x-if="p.current_stock <= p.reorder_level">
                                            <span class="text-[10px] block text-red-600 font-bold" x-text="t('low_stock_alert')"></span>
                                        </template>
                                    </td>
                                    <td class="p-4 text-center text-gray-400 italic text-sm" x-text="p.reorder_level"></td>
                                    <td class="p-4 text-gray-500 text-sm" x-text="p.unit"></td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Warehouse Insights Section -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
            <!-- Low Stock Column -->
            <div @click="toggleLowStockFilter()" class="bg-red-50 rounded-2xl border border-red-100 p-6 shadow-sm cursor-pointer hover:bg-red-100 transition-colors">
                <div class="flex items-center gap-2 mb-4">
                    <span class="text-xl">⚠️</span>
                    <h3 class="font-black text-red-900 border-b-2 border-red-200 pb-1" x-text="t('low_stock_items')"></h3>
                </div>
                <div class="space-y-3 max-h-64 overflow-y-auto pr-2">
                    <template x-for="p in warehouseStats.low_stock_list" :key="p.id">
                        <div class="flex justify-between items-center bg-white p-3 rounded-xl border border-red-50 shadow-sm text-right">
                            <span class="font-bold text-sm text-slate-700" x-text="locName(p)"></span>
                            <div class="text-left">
                                <span class="text-red-600 font-black" x-text="p.current"></span>
                                <span class="text-[10px] text-slate-400" x-text="' / ' + p.min"></span>
                            </div>
                        </div>
                    </template>
                    <template x-if="warehouseStats.low_stock_list.length === 0">
                        <div class="text-center py-6 text-emerald-600 font-bold" x-text="t('all_items_good')"></div>
                    </template>
                </div>
            </div>

            <!-- Top Moving Column -->
            <div class="bg-indigo-50 rounded-2xl border border-indigo-100 p-6 shadow-sm">
                <div class="flex items-center gap-2 mb-4">
                    <span class="text-xl">📊</span>
                    <h3 class="font-black text-indigo-900 border-b-2 border-indigo-200 pb-1" x-text="t('top_moving_title')"></h3>
                </div>
                <div class="space-y-3 max-h-64 overflow-y-auto pr-2">
                    <template x-for="(p, idx) in warehouseStats.top_moving" :key="p.id">
                        <div class="flex justify-between items-center bg-white p-3 rounded-xl border border-indigo-50 shadow-sm text-right">
                            <div class="flex items-center gap-2">
                                <span class="w-6 h-6 rounded-full bg-indigo-600 text-white text-[10px] flex items-center justify-center font-bold" x-text="idx + 1"></span>
                                <span class="font-bold text-sm text-slate-700" x-text="locName(p)"></span>
                            </div>
                            <span class="bg-indigo-100 text-indigo-700 px-2 py-0.5 rounded-lg text-[10px] font-black" x-text="p.frequency + ' ' + t('movement_frequency')"></span>
                        </div>
                    </template>
                </div>
            </div>

            <!-- Most Purchased Column -->
            <div class="bg-amber-50 rounded-2xl border border-amber-100 p-6 shadow-sm flex flex-col">
                <div class="flex items-center gap-2 mb-4">
                    <span class="text-xl">🛒</span>
                    <h3 class="font-black text-amber-900 border-b-2 border-amber-200 pb-1" x-text="t('most_purchased_title')"></h3>
                </div>
                <div class="flex-1 flex flex-col items-center justify-center text-center p-4">
                    <template x-if="warehouseStats.most_purchased">
                        <div class="space-y-4">
                            <div class="text-4xl">🏆</div>
                            <div class="font-black text-xl text-amber-900" x-text="locName(warehouseStats.most_purchased)"></div>
                            <div class="text-sm text-amber-600 font-bold" x-show="lang !== 'zh' && warehouseStats.most_purchased.name_chinese" x-text="warehouseStats.most_purchased.name_chinese"></div>
                            <div class="bg-amber-100 text-amber-800 px-6 py-2 rounded-2xl inline-block mt-4">
                                <span class="text-2xl font-black" x-text="warehouseStats.most_purchased.count"></span>
                                <span class="text-xs font-bold block" x-text="t('addition_type')"></span>
                            </div>
                        </div>
                    </template>
                    <template x-if="!warehouseStats.most_purchased">
                        <div class="text-slate-400 italic" x-text="t('no_purchases_data')"></div>
                    </template>
                </div>
            </div>
        </div>

        <!-- Movements Log -->
        <div class="bg-white rounded-xl shadow-lg border overflow-hidden mt-8">
            <div class="p-4 border-b bg-gray-50 flex flex-wrap justify-between items-center gap-3">
                <h3 class="font-bold flex items-center gap-2">
                    <span x-text="t('recent_movements')"></span>
                    <template x-if="movementFilterProductId">
                        <span class="bg-indigo-600 text-white px-2 py-0.5 rounded-full text-[10px] flex items-center gap-1">
                            <span x-text="t('type') + ': ' + products.find(p => p.id == movementFilterProductId)?.name"></span>
                            <button @click="movementFilterProductId = null" class="font-bold">&times;</button>
                        </span>
                    </template>
                </h3>
                <!-- Search by doc_number -->
                <div class="flex items-center gap-2">
                    <input type="text" x-model="docSearchQuery"
                        @input.debounce.400ms="searchMovementsByDoc()"
                        :placeholder="t('doc_number') + ' WH-...'"
                        class="border-2 rounded-xl px-4 py-2 text-sm focus:border-indigo-500 outline-none w-52 font-mono">
                    <button @click="docSearchQuery = ''; fetchWarehouseData()"
                        x-show="docSearchQuery"
                        class="text-red-400 hover:text-red-600 text-sm font-bold">&times; <span x-text="t('cancel')"></span></button>
                </div>
            </div>
            <div class="overflow-y-auto max-h-[400px]">
                <table class="w-full text-right text-sm">
                    <thead class="bg-gray-100 sticky top-0 text-slate-500">
                        <tr>
                            <th class="p-4" x-text="t('date')"></th>
                            <th class="p-4" x-text="t('warehouse')"></th>
                            <th class="p-4" x-text="t('product_name')"></th>
                            <th class="p-4" x-text="t('type')"></th>
                            <th class="p-4" x-text="t('quantity')"></th>
                            <th class="p-4" x-text="t('actions')"></th>
                        </tr>
                    </thead>
                    <tbody>
                        <template x-for="m in filteredMovements" :key="m.id">
                            <tr class="border-b hover:bg-gray-50">
                                <td class="p-3">
                                    <span class="font-mono text-[10px] text-indigo-600 bg-indigo-50 px-2 py-1 rounded-lg font-bold cursor-pointer"
                                        @click="docSearchQuery = m.doc_number || ''; searchMovementsByDoc()"
                                        x-text="m.doc_number || '-'"
                                        :title="m.doc_number ? 'اضغط لعرض كل عمليات هذا المستند' : ''"></span>
                                </td>
                                <td class="p-4 text-[10px]" x-text="m.date"></td>
                                <td class="p-4 font-bold text-indigo-600" x-text="locName(m.location, '-')"></td>
                                <td class="p-4" x-text="locName(m.product, 'محذوف')"></td>
                                <td class="p-4 text-[10px]" x-text="m.type"></td>
                                <td class="p-4 font-bold" x-text="m.quantity"></td>
                                <td class="p-4 flex gap-1">
                                    <button @click="editMovement(m)" class="text-blue-500">✏️</button>
                                    <button @click="deleteMovement(m.id)" class="text-red-500">🗑️</button>
                                </td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Locations Section -->
    <div x-show="warehouseView === 'locations'">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="bg-white p-6 rounded-xl shadow-lg border">
                <h3 class="font-bold mb-4" x-text="t('add_location')"></h3>
                <div class="space-y-4">
                    <input type="text" x-model="newLocation.name" 
                        @input.debounce.500ms="translateText(newLocation.name, (val) => { newLocation.name_chinese = val.zh; newLocation.name_en = val.en; })"
                        :placeholder="t('name_ar')" class="w-full border-2 p-3 rounded-xl focus:border-indigo-500 outline-none font-bold">
                    <div class="grid grid-cols-2 gap-2">
                        <input type="text" x-model="newLocation.name_chinese" class="w-full border p-2 rounded-xl text-xs italic text-indigo-500" :placeholder="t('name_zh')">
                        <input type="text" x-model="newLocation.name_en" class="w-full border p-2 rounded-xl text-xs italic text-teal-600" :placeholder="'Name (English)'">
                    </div>
                    <textarea x-model="newLocation.description" :placeholder="t('description')" class="w-full border p-3 rounded-xl h-24 outline-none focus:border-indigo-500"></textarea>
                    <button @click="addLocation()" class="bg-indigo-600 text-white w-full py-3 rounded-xl font-bold hover:bg-indigo-700 shadow-lg" x-text="t('save_location')"></button>
                </div>
            </div>
            <div class="bg-white rounded-xl shadow-lg border overflow-hidden">
                <table class="w-full text-right">
                    <thead class="bg-gray-100 text-slate-500">
                        <tr>
                            <th class="p-4" x-text="t('warehouse')"></th>
                            <th class="p-4" x-text="t('description')"></th>
                            <th class="p-4" x-text="t('actions')"></th>
                        </tr>
                    </thead>
                    <tbody>
                        <template x-for="loc in locations" :key="loc.id">
                            <tr class="border-b">
                                <td class="p-4">
                                     <div class="font-bold text-indigo-900" x-text="locName(loc)"></div>
                                     <div class="text-[10px] text-indigo-400 italic" x-show="lang !== 'zh' && loc.name_chinese" x-text="loc.name_chinese"></div>
                                 </td>
                                 <td class="p-4 text-gray-500" x-text="locDesc(loc) || '-'"></td>
                                <td class="p-4">
                                    <button @click="deleteLocation(loc.id)" class="text-red-600">🗑️</button>
                                </td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Stock Per Location Report -->
        <div class="mt-8 bg-white p-6 rounded-xl shadow-lg border">
            <h3 class="font-black text-xl mb-6 text-indigo-900 border-b pb-4" x-text="t('stock_per_location_title')"></h3>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <template x-for="loc in stockPerLocation" :key="loc.id">
                    <div class="border-2 border-slate-100 rounded-2xl overflow-hidden shadow-sm">
                        <div class="bg-slate-100 p-4 font-black flex justify-between">
                            <span x-text="locName(loc)"></span>
                            <span class="text-indigo-600 text-xs" x-text="loc.stocks.length + ' ' + t('items_count')"></span>
                        </div>
                        <div class="p-4 space-y-3">
                            <template x-for="st in loc.stocks" :key="st.product_id">
                                <div class="flex flex-col border-b border-dotted pb-2">
                                    <div class="flex justify-between items-center text-sm">
                                        <span class="text-slate-700 font-bold" x-text="locName({name: st.product_name, name_chinese: st.product_name_chinese, name_en: st.product_name_en})"></span>
                                        <span class="font-black text-indigo-900" x-text="st.quantity"></span>
                                    </div>
                                    <div class="text-[10px] text-indigo-400 italic" x-show="lang !== 'zh' && st.product_name_chinese" x-text="st.product_name_chinese || ''"></div>
                                </div>
                            </template>
                            <template x-if="loc.stocks.length === 0">
                                <p class="text-center text-gray-400 text-xs py-4" x-text="t('empty_warehouse')"></p>
                            </template>
                        </div>
                    </div>
                </template>
            </div>
        </div>
    </div>

    <!-- Transfers Section -->
    <div x-show="warehouseView === 'transfers'">
        <div class="max-w-2xl mx-auto bg-white p-8 rounded-3xl shadow-2xl border border-indigo-50">
            <h2 class="text-2xl font-black text-indigo-950 mb-8 flex items-center gap-3">
                <span class="bg-indigo-600 text-white p-2 rounded-xl text-lg">⇄</span> 
                <span x-text="t('internal_transfer')"></span>
            </h2>
            <div class="space-y-6">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2" x-text="t('product_to_transfer')"></label>
                    <div class="relative" x-data="{ 
                        open: false, 
                        search: '',
                        init() {
                            this.$watch('transferData.product_id', (val) => {
                                if (!val) this.search = '';
                                else {
                                    const p = products.find(p => p.id == val);
                                    if (p) this.search = locName(p);
                                }
                            });
                        }
                    }">
                        <input type="text" x-model="search" @focus="open = true" @input="open = true" @click.away="setTimeout(() => open = false, 200)"
                            :placeholder="t('search_product_placeholder')"
                            class="w-full border-2 border-slate-100 p-4 rounded-2xl outline-none focus:border-indigo-500 font-bold bg-white">
                        
                        <div x-show="open" x-transition class="absolute z-50 w-full mt-2 bg-white border-2 border-slate-100 rounded-2xl shadow-2xl max-h-64 overflow-y-auto">
                            <template x-for="p in products.filter(p => !search || p.name.includes(search) || (p.code && p.code.includes(search)))" :key="p.id">
                                <div @click="transferData.product_id = p.id; search = locName(p); open = false" 
                                    class="p-4 hover:bg-indigo-50 cursor-pointer border-b border-slate-50 last:border-0 transition-colors text-right">
                                    <div class="font-black text-slate-800" x-text="locName(p)"></div>
                                    <div class="flex justify-between items-center mt-1">
                                        <div class="text-[10px] text-indigo-400 font-bold" x-text="p.code ? t('product_code') + ': ' + p.code : ''"></div>
                                        <div class="text-[10px] text-gray-400 font-bold" x-text="t('available_stock') + ': ' + p.current_stock + ' ' + (p.unit || '')"></div>
                                    </div>
                                    <div class="text-[10px] text-indigo-400 italic" x-show="lang !== 'zh' && p.name_chinese" x-text="p.name_chinese"></div>
                                </div>
                            </template>
                            <div x-show="products.filter(p => !search || p.name.includes(search) || (p.code && p.code.includes(search))).length === 0" 
                                class="p-4 text-center text-slate-400 font-bold" x-text="t('no_results')">
                            </div>
                        </div>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2" x-text="t('from_source')"></label>
                        <select x-model="transferData.from_location_id"
                            class="w-full border-2 border-slate-100 p-4 rounded-2xl outline-none focus:border-indigo-500 bg-red-50/50">
                            <option value="" x-text="t('select_source')"></option>
                            <template x-for="loc in locations" :key="loc.id">
                                <option :value="loc.id" x-text="loc.name"></option>
                            </template>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2" x-text="t('to_dest')"></label>
                        <select x-model="transferData.to_location_id"
                            class="w-full border-2 border-slate-100 p-4 rounded-2xl outline-none focus:border-indigo-500 bg-green-50/50">
                            <option value="" x-text="t('select_dest')"></option>
                            <template x-for="loc in locations" :key="loc.id">
                                <option :value="loc.id" x-text="loc.name"></option>
                            </template>
                        </select>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2" x-text="t('transfer_qty')"></label>
                        <input type="number" x-model="transferData.quantity"
                            class="w-full border-2 border-slate-100 p-4 rounded-2xl outline-none focus:border-indigo-500 font-black text-xl">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2" x-text="t('transfer_date')"></label>
                        <input type="date" x-model="transferData.date"
                            class="w-full border-2 border-slate-100 p-4 rounded-2xl outline-none focus:border-indigo-500">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2" x-text="t('transfer_notes')"></label>
                    <textarea x-model="transferData.notes"
                        class="w-full border-2 border-slate-100 p-4 rounded-2xl outline-none focus:border-indigo-500"
                        :placeholder="t('notes_placeholder')"></textarea>
                </div>
                <button @click="createTransfer()"
                    class="bg-gradient-to-r from-indigo-600 to-indigo-500 text-white w-full py-5 rounded-3xl font-black text-xl shadow-xl hover:-translate-y-1 transition active:scale-95" x-text="t('submit_transfer')"></button>
            </div>
        </div>
    </div><!-- END transfers section -->

    <!-- Bulk Entry Section -->
    <div x-show="warehouseView === 'bulk_entry'">
        <!-- Header bar -->
        <div class="bg-white p-6 rounded-3xl shadow-xl border border-slate-100 mb-6 flex flex-wrap items-center justify-between gap-4">
            <div class="flex items-center gap-3">
                <span class="text-2xl">⚡</span>
                <div>
                    <h2 class="text-xl font-black text-slate-800" x-text="t('bulk_entry_header')"></h2>
                    <p class="text-sm text-slate-400" x-text="bulkMovements.items.length + ' ' + t('bulk_items_added')"></p>
                </div>
            </div>
            <div class="flex gap-3">
                <button @click="addBulkItem()" class="bg-slate-100 text-slate-700 px-5 py-2.5 rounded-xl font-bold border border-slate-200 hover:bg-slate-200 transition" x-text="t('bulk_add_row')"></button>
                <button @click="submitBulkMovements()"
                    class="bg-indigo-600 text-white px-8 py-2.5 rounded-xl font-bold hover:bg-indigo-700 shadow-lg transition flex items-center gap-2">
                    <span>💾</span> <span x-text="t('bulk_save')"></span>
                </button>
            </div>
        </div>

        <!-- Settings bar - adapts based on type -->
        <div class="bg-white p-5 rounded-3xl shadow-md border border-slate-100 mb-6">
            <div class="grid grid-cols-2 md:grid-cols-5 gap-4 items-end">
                <!-- Type selector - always shown -->
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1" x-text="t('type')"></label>
                    <select x-model="bulkMovements.type" class="w-full border-2 p-3 rounded-xl focus:border-indigo-500 font-bold text-sm">
                        <option value="Addition" x-text="'📥 ' + t('addition_type')"></option>
                        <option value="Disposal" x-text="'📤 ' + t('disposal_type')"></option>
                        <option value="Transfer" x-text="'🔄 ' + t('warehouse_transfers')"></option>
                    </select>
                </div>

                <!-- Transfer: From location -->
                <template x-if="bulkMovements.type === 'Transfer'">
                    <div>
                        <label class="block text-xs font-bold text-red-500 mb-1" x-text="'📦 ' + t('from_source')"></label>
                        <select x-model="bulkMovements.from_location_id" class="w-full border-2 border-red-200 p-3 rounded-xl focus:border-red-500 bg-red-50 text-sm">
                            <option value="" x-text="t('select_source')"></option>
                            <template x-for="loc in locations" :key="loc.id">
                                <option :value="loc.id" x-text="locName(loc)"></option>
                            </template>
                        </select>
                    </div>
                </template>

                <!-- Transfer: To location -->
                <template x-if="bulkMovements.type === 'Transfer'">
                    <div>
                        <label class="block text-xs font-bold text-green-600 mb-1" x-text="'🏪 ' + t('to_dest')"></label>
                        <select x-model="bulkMovements.to_location_id" class="w-full border-2 border-green-200 p-3 rounded-xl focus:border-green-500 bg-green-50 text-sm">
                            <option value="" x-text="t('select_dest')"></option>
                            <template x-for="loc in locations" :key="loc.id">
                                <option :value="loc.id" x-text="loc.name"
                                    :disabled="loc.id == bulkMovements.from_location_id"></option>
                            </template>
                        </select>
                    </div>
                </template>

                <!-- Addition/Disposal: Single location -->
                <template x-if="bulkMovements.type !== 'Transfer'">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-1" x-text="t('bulk_location')"></label>
                        <select x-model="bulkMovements.location_id" class="w-full border-2 p-3 rounded-xl focus:border-indigo-500 text-sm">
                            <option value="" x-text="t('select_warehouse')"></option>
                            <template x-for="loc in locations" :key="loc.id">
                                <option :value="loc.id" x-text="loc.name"></option>
                            </template>
                        </select>
                    </div>
                </template>

                <!-- Date - always shown -->
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1" x-text="t('date')"></label>
                    <input type="date" x-model="bulkMovements.date" class="w-full border-2 p-3 rounded-xl focus:border-indigo-500 text-sm">
                </div>

                <!-- Notes - always shown -->
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1" x-text="t('bulk_general_note')"></label>
                    <input type="text" x-model="bulkMovements.notes" :placeholder="t('details') + '...'" class="w-full border-2 p-3 rounded-xl focus:border-indigo-500 text-sm">
                </div>
            </div>

            <!-- Transfer summary badge -->
            <template x-if="bulkMovements.type === 'Transfer' && bulkMovements.from_location_id && bulkMovements.to_location_id">
                <div class="mt-4 bg-indigo-50 border border-indigo-200 rounded-2xl p-3 flex items-center gap-3 text-sm font-bold text-indigo-800">
                    <span class="bg-red-100 text-red-700 px-3 py-1 rounded-lg" x-text="locName(locations.find(l => l.id == bulkMovements.from_location_id))"></span>
                    <span class="text-2xl">→</span>
                    <span class="bg-green-100 text-green-700 px-3 py-1 rounded-lg" x-text="locName(locations.find(l => l.id == bulkMovements.to_location_id))"></span>
                    <span class="text-indigo-500 font-normal mr-2" x-text="'(' + bulkMovements.items.filter(i => i.product_id && i.quantity > 0).length + ' ' + t('items_count') + ')'"></span>
                </div>
            </template>
        </div>

        <div class="bg-white rounded-3xl shadow-lg border border-slate-100 overflow-hidden">
            <table class="w-full text-right border-collapse">
                <thead class="bg-slate-50 border-b-2">
                    <tr>
                        <th class="p-4 w-12 text-center text-slate-400">#</th>
                        <th class="p-4 w-1/3" x-text="t('product_name')"></th>
                        <th class="p-4" x-text="t('quantity')"></th>
                        <template x-if="bulkMovements.type === 'Addition'">
                            <th class="p-4" x-text="t('price_label') + ' (' + t('unit_price_optional') + ')'"></th>
                        </template>
                        <th class="p-4" x-text="t('bulk_sub_note')"></th>
                        <th class="p-4 w-16"></th>
                    </tr>
                </thead>
                <tbody>
                    <template x-for="(item, index) in bulkMovements.items" :key="index">
                        <tr class="border-b hover:bg-slate-50">
                            <td class="p-4 text-center font-mono text-slate-400" x-text="index + 1"></td>
                                <td class="p-4">
                                    <div class="relative" x-data="{ 
                                        open: false, 
                                        search: products.find(p => p.id == item.product_id)?.name || '',
                                        init() {
                                            this.$watch('item.product_id', (val) => {
                                                const p = products.find(x => x.id == val);
                                                this.search = p ? p.name : '';
                                            });
                                        }
                                    }">
                                        <input type="text" x-model="search" @focus="open = true" @input="open = true" @click.away="setTimeout(() => open = false, 200)"
                                            class="w-full border p-2 rounded-lg text-sm bg-transparent outline-none border-slate-200" 
                                            :placeholder="t('search_placeholder')">
                                        
                                        <div x-show="open" x-transition class="absolute z-50 w-full mt-2 bg-white border-2 border-slate-100 rounded-xl shadow-2xl max-h-48 overflow-y-auto">
                                            <template x-for="p in products.filter(p => !search || p.name.includes(search) || (p.code && p.code.includes(search)))" :key="p.id">
                                                <div @click="item.product_id = p.id; search = p.name; open = false" 
                                                    class="p-2 hover:bg-indigo-50 cursor-pointer border-b border-slate-50 last:border-0 transition-colors text-right">
                                                    <div class="text-[11px] font-bold text-slate-800" x-text="p.name"></div>
                                                    <div class="text-[9px] text-indigo-400 font-bold" x-text="p.code ? '[' + p.code + ']' : ''"></div>
                                                </div>
                                            </template>
                                        </div>
                                    </div>
                                </td>
                            <td class="p-4">
                                <input type="number" x-model="item.quantity" class="w-full border p-2 rounded-lg text-sm bg-transparent outline-none border-slate-200 text-center font-bold">
                            </td>
                            <template x-if="bulkMovements.type === 'Addition'">
                                <td class="p-4">
                                    <input type="number" x-model="item.unit_price" class="w-full border p-2 rounded-lg text-sm bg-transparent outline-none border-slate-200 text-center">
                                </td>
                            </template>
                            <td class="p-4">
                                <input type="text" x-model="item.notes" :placeholder="t('details') + '...'" class="w-full border p-2 rounded-lg text-sm bg-transparent outline-none border-slate-200">
                            </td>
                            <td class="p-4 text-center">
                                <button @click="removeBulkItem(index)" class="text-red-400 hover:text-red-600 transition">✕</button>
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>
            <div class="p-6 bg-slate-50 border-t flex justify-center">
                <button @click="addBulkItem()" class="text-indigo-600 font-bold hover:underline" x-text="t('bulk_add_row')"></button>
            </div>
        </div>
    </div>
</div>
